version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Worker build toolchain, exact-pinned in worker/package.json (wrangler,
  # typescript). Dependabot bumps those pins via grouped weekly PRs.
  - package-ecosystem: "npm"
    directory: "/worker"
    schedule:
      interval: "weekly"
    groups:
      worker-toolchain:
        patterns: ["*"]
